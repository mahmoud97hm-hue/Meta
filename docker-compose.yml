# docker-compose.yml — Railway deployment (Linux/amd64)
#
# Railway runs Linux containers and provides PRIVATE networking between
# services on the same project. The bot reaches the MT5 bridge at the
# service name `mt5` (Railway injects RAILWAY_PRIVATE_DOMAIN / service DNS).
#
# IMPORTANT: Railway auto-exposes the PORT it detects. We publish the
# socket.io port (3000) for the bot and keep VNC DISABLED entirely to save
# RAM. No public exposure of MT5 — bot talks over Railway private network.

services:
  # ── Headless MT5 + DWXConnect Socket.IO bridge ──
  # Aggressively stripped: NO VNC, NO Openbox WM, Xvfb virtual display only.
  mt5:
    build:
      context: ./mt5-bridge
      dockerfile: Dockerfile
    environment:
      # Railway private networking: bind socket.io to 0.0.0.0 inside the
      # container; reachable by the bot at http://mt5:3000
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_PORT=3000
      - DISPLAY=:99
      # MT5 auto-login (inject via Railway vault in real deploy)
      - MT5_LOGIN=${MT5_LOGIN}
      - MT5_PASSWORD=${MT5_PASSWORD}
      - MT5_SERVER=${MT5_SERVER}
      # Optional API key the socket.io server enforces
      - BRIDGE_API_KEY=${BRIDGE_API_KEY:-}
      # Resource savers
      - MT5_DISABLE_NEWS=1
      - MT5_NO_SPLASH=1
    # Railway will expose 3000 automatically; this is for local `docker compose`
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    healthcheck:
      # socket.io exposes an HTTP health endpoint in our server wrapper
      test: ["CMD", "python", "-c", "import socket,sys; s=socket.socket(); sys.exit(0 if s.connect_ex(('127.0.0.1',3000))==0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: always

  # ── Gann Scalper Bot ──
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      # Private-network address of the bridge service (Railway DNS)
      - BRIDGE_URL=http://mt5:3000
      - BRIDGE_API_KEY=${BRIDGE_API_KEY:-}
      - PYTHONUNBUFFERED=1
    depends_on:
      - mt5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: always
